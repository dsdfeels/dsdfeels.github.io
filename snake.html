<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Змейка | DsDfeels Edition</title>
    <style>
        :root {
            --bg-color: #0f171e;
            --panel-bg: #1a2530;
            --accent: #00e5ff;
            --text: #ffffff;
            --btn-bg: #00e5ff;
            --btn-text: #0f171e;
            --danger: #ff4d4d;
        }

        .light-theme {
            --bg-color: #e0e5ec;
            --panel-bg: #ffffff;
            --accent: #007bff;
            --text: #1a1a1a;
            --btn-bg: #007bff;
            --btn-text: #ffffff;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
        }

        .game-wrapper {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 229, 255, 0.2), inset 0 0 15px rgba(0, 229, 255, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--accent);
            font-size: 22px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            transition: transform 0.3s;
        }

        .theme-toggle:hover { transform: rotate(20deg); }

        canvas {
            background: #1a2530;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            color: var(--text);
            margin: 15px 5px 10px;
            font-size: 16px;
        }

        .stats span { color: var(--accent); font-weight: bold; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.2);
        }

        .btn:hover { transform: scale(1.05); }
        
        .btn-control { background: var(--btn-bg); color: var(--btn-text); }
        .btn-control:active { transform: scale(0.95); }
        
        .btn-restart { background: var(--danger); color: white; }
        .btn-restart:hover { background: #cc0000; }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
            margin: 10px auto 0;
        }

        .dpad button {
            border: none;
            border-radius: 10px;
            background: var(--btn-bg);
            color: var(--btn-text);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .dpad button:active { transform: scale(0.9); }
        .dpad .center { background: transparent; box-shadow: none; cursor: default; }
        @media (max-width: 500px) {
            .game-wrapper { padding: 15px; }
            .dpad { grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); }
        }
    </style>
</head>
<body>

<div class="game-wrapper" id="gameWrapper">
    <div class="header">
        <h1>🐍 DsDfeels</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="stats">
        <div>🍎 Счёт: <span id="score">0</span></div>
        <div>🏆 Рекорд: <span id="highScore">0</span></div>
    </div>

    <!-- Кнопки управления -->
    <div class="controls">
        <button class="btn btn-control" onclick="changeDirection('up')">⬆️</button>
        <button class="btn btn-control" onclick="changeDirection('left')">⬅️</button>
        <button class="btn btn-control" onclick="changeDirection('down')">⬇️</button>
        <button class="btn btn-control" onclick="changeDirection('right')">➡️</button>
        <button class="btn btn-restart" onclick="restartGame()">🔄 Заново</button>
    </div>

    <!-- D-Pad для мобильных -->
    <div class="dpad">
        <div></div>
        <button onclick="changeDirection('up')">⬆️</button>
        <div></div>
        <button onclick="changeDirection('left')">⬅️</button>
        <div class="center"></div>
        <button onclick="changeDirection('right')">➡️</button>
        <div></div>
        <button onclick="changeDirection('down')">⬇️</button>
        <div></div>
    </div>
</div>

<script>
    // --- ЛОГИКА ИГРЫ ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const highScoreDisplay = document.getElementById('highScore');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let direction = {x: 0, y: 0};
    let food = {x: 15, y: 15};
    let score = 0;
    let highScore = localStorage.getItem('dsdfeelsSnakeHighScore') || 0;
    let gameOver = false;
    let gameLoop;
    let isNewRecord = false;

    highScoreDisplay.textContent = highScore;

    // Звук через Web Audio API (без внешних файлов)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playEatSound() {
        if (!audioCtx) audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playGameOverSound() {
        if (!audioCtx) audioCtx = new AudioContext();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 200;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function generateFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
        snake.forEach(segment => {
            if (segment.x === food.x && segment.y === food.y) generateFood();
        });
    }

    function draw() {
        ctx.fillStyle = '#0f171e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Змейка (с градиентом)
        snake.forEach((segment, index) => {
            const gradient = ctx.createRadialGradient(
                segment.x * gridSize + 5, segment.y * gridSize + 5, 2,
                segment.x * gridSize + 10, segment.y * gridSize + 10, 10
            );
            gradient.addColorStop(0, '#00e5ff');
            gradient.addColorStop(1, '#007bff');
            ctx.fillStyle = gradient;
            ctx.shadowColor = '#00e5ff';
            ctx.shadowBlur = 10;
            ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
        });
        ctx.shadowBlur = 0;

        // Еда (сияющая)
        ctx.shadowColor = '#ff4d4d';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff4d4d';
        ctx.beginPath();
        ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4d4d';
            ctx.font = 'bold 30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('💀 GAME OVER', canvas.width/2, canvas.height/2 - 20);
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Arial';
            ctx.fillText('Нажми "Заново"', canvas.width/2, canvas.height/2 + 30);
            if (isNewRecord) {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 20px Arial';
                ctx.fillText('🎉 НОВЫЙ РЕКОРД!', canvas.width/2, canvas.height/2 - 70);
            }
        }
    }

    function update() {
        if (gameOver) return;

        const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

        // Стены
        if (head.x < 0  || head.y < 0  || head.x >= tileCount || head.y >= tileCount) {
            gameOver = true;
            playGameOverSound();
            clearInterval(gameLoop);
            draw();
            return;
        }

        // Хвост
        for (let i = 1; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) {
                gameOver = true;
                playGameOverSound();
                clearInterval(gameLoop);
                draw();
                return;
            }
        }

        // Еда
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreDisplay.textContent = score;
            playEatSound();
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
                localStorage.setItem('dsdfeelsSnakeHighScore', highScore);
                isNewRecord = true;
            } else {
                isNewRecord = false;
            }
            generateFood();
        } else {
            snake.pop();
        }

        snake.unshift(head);
        draw();
    }

    function changeDirection(dir) {
        if (gameOver) return;
        if (dir === 'up' && direction.y === 0) { direction = {x: 0, y: -1}; }
        else if (dir === 'down' && direction.y === 0) { direction = {x: 0, y: 1}; }
        else if (dir === 'left' && direction.x === 0) { direction = {x: -1, y: 0}; }
        else if (dir === 'right' && direction.x === 0) { direction = {x: 1, y: 0}; }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') changeDirection('up');
        if (e.key === 'ArrowDown') changeDirection('down');
        if (e.key === 'ArrowLeft') changeDirection('left');
        if (e.key === 'ArrowRight') changeDirection('right');
    });

    function restartGame() {
        clearInterval(gameLoop);
        snake = [{x: 10, y: 10}];
        direction = {x: 0, y: 0};
        score = 0;
        gameOver = false;
        isNewRecord = false;
        scoreDisplay.textContent = 0;
        generateFood();
        gameLoop = setInterval(update, 100);
        draw();
    }
    function toggleTheme() {
        const wrapper = document.getElementById('gameWrapper');
        const btn = document.querySelector('.theme-toggle');
        wrapper.classList.toggle('light-theme');
        btn.textContent = wrapper.classList.contains('light-theme') ? '☀️' : '🌙';
    }

    generateFood();
    gameLoop = setInterval(update, 100);
    draw();
</script>

<!-- Кнопка возврата в стиле нового портфолио -->
<div style="position: fixed; bottom: 25px; left: 25px; z-index: 9999; font-family: 'Segoe UI', system-ui, sans-serif;">
    <a href="https://dsdfeels.github.io" style="display: inline-flex; align-items: center; gap: 10px; background: #1e293b; color: #f1f5f9; padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); border: 1px solid rgba(59, 130, 246, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <span style="font-size: 20px; line-height: 1;">⬅</span>
        Вернуться в портфолио
    </a>
</div>
</body>
</html>
